---
- name: Verify target user exists
  ansible.builtin.getent:
    database: passwd
    key: "{{ target_user }}"

- name: Set zsh as the default shell for the target user
  become: true
  ansible.builtin.user:
    name: "{{ target_user }}"
    shell: /usr/bin/zsh

- name: Ensure dotfiles parent directory exists
  become: true
  ansible.builtin.file:
    path: "{{ dotfiles_dest | dirname }}"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0755"

- name: Clone or update dotfiles repository
  become: true
  become_user: "{{ target_user }}"
  ansible.builtin.git:
    repo: "{{ dotfiles_repo }}"
    dest: "{{ dotfiles_dest }}"
    version: main
    update: true
    accept_hostkey: true

- name: Ensure .config directory exists
  become: true
  become_user: "{{ target_user }}"
  ansible.builtin.file:
    path: "{{ target_home }}/.config"
    state: directory
    mode: "0755"

- name: Run GNU Stow for all dotfile folders
  become: true
  become_user: "{{ target_user }}"
  ansible.builtin.shell:
    cmd: 'stow -v -t "$HOME" */'
    chdir: "{{ dotfiles_dest }}"
  args:
    executable: /bin/bash
  environment:
    HOME: "{{ target_home }}"
  register: stow_result
  changed_when: true

- name: Show Stow result
  ansible.builtin.debug:
    var: stow_result.stdout_lines

- name: Clone Powerlevel10k theme into the oh-my-zsh custom directory
  become: true
  become_user: "{{ target_user }}"
  ansible.builtin.git:
    repo: https://github.com/romkatv/powerlevel10k.git
    dest: "{{ target_home }}/.oh-my-zsh/custom/themes/powerlevel10k"
    depth: 1
    version: master
    update: true
    accept_hostkey: true

- name: Ensure Noctalia starts with Hyprland
  become: true
  become_user: "{{ target_user }}"
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/hypr/conf/autostart.conf"
    line: "exec-once = qs -c noctalia-shell"
    regexp: "^exec-once\\s*=\\s*qs\\s+-c\\s+noctalia-shell$"
    create: true
    mode: "0644"
