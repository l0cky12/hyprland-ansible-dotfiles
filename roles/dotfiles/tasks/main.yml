---
- name: Verify target user exists
  ansible.builtin.getent:
    database: passwd
    key: "{{ target_user }}"

- name: Ensure dotfiles parent directory exists
  become: true
  ansible.builtin.file:
    path: "{{ dotfiles_dest | dirname }}"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0755"

- name: Clone or update dotfiles repository
  become: true
  become_user: "{{ target_user }}"
  ansible.builtin.git:
    repo: "{{ dotfiles_repo }}"
    dest: "{{ dotfiles_dest }}"
    version: main
    update: true
    accept_hostkey: true

- name: Check that requested Stow package directories exist
  ansible.builtin.stat:
    path: "{{ dotfiles_dest }}/{{ item }}"
  loop: "{{ stow_packages }}"
  register: stow_package_dirs

- name: Fail if any configured Stow package directory is missing
  ansible.builtin.fail:
    msg: "Stow package directory missing: {{ dotfiles_dest }}/{{ item.item }}"
  loop: "{{ stow_package_dirs.results }}"
  when: not item.stat.exists

- name: Dry-run Stow to detect conflicts
  become: true
  become_user: "{{ target_user }}"
  ansible.builtin.command:
    cmd: "stow --simulate --verbose --target={{ target_home }} {{ item }}"
    chdir: "{{ dotfiles_dest }}"
  loop: "{{ stow_packages }}"
  register: stow_dry_run
  changed_when: false
  failed_when: false

- name: Show Stow dry-run output
  ansible.builtin.debug:
    msg: |
      Stow package: {{ item.item }}
      Return code: {{ item.rc }}
      STDOUT:
      {{ item.stdout }}
      STDERR:
      {{ item.stderr }}
  loop: "{{ stow_dry_run.results }}"
  when: item.stdout | length > 0 or item.stderr | length > 0

- name: Ensure .config directory exists
  become: true
  become_user: "{{ target_user }}"
  ansible.builtin.file:
    path: "{{ target_home }}/.config"
    state: directory
    mode: "0755"

- name: Run GNU Stow for configured packages
  become: true
  become_user: "{{ target_user }}"
  ansible.builtin.command:
    cmd: "stow --restow --target={{ target_home }} {{ item }}"
    chdir: "{{ dotfiles_dest }}"
  loop: "{{ stow_packages }}"
  register: stow_result
  changed_when: true

- name: Show Stow result
  ansible.builtin.debug:
    msg: "Stowed package {{ item.item }}"
  loop: "{{ stow_result.results }}"
