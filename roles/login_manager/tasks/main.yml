---
- name: Install Hyprland session packages
  become: true
  community.general.pacman:
    name: "{{ hyprland_session_packages }}"
    state: present
  when:
    - enable_login_manager | bool
    - login_manager == "sddm"

- name: Install SDDM login manager
  become: true
  community.general.pacman:
    name: "{{ login_manager_packages }}"
    state: present
  when:
    - enable_login_manager | bool
    - login_manager == "sddm"

- name: Ensure SDDM config directory exists
  become: true
  ansible.builtin.file:
    path: /etc/sddm.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - enable_login_manager | bool
    - login_manager == "sddm"

- name: Ensure Wayland session directory exists
  become: true
  ansible.builtin.file:
    path: /usr/share/wayland-sessions
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - enable_login_manager | bool
    - login_manager == "sddm"

- name: Remove old bad start-hyprland wrapper if this playbook created it
  become: true
  ansible.builtin.file:
    path: /usr/local/bin/start-hyprland
    state: absent
  when:
    - enable_login_manager | bool
    - login_manager == "sddm"

- name: Create SDDM Hyprland launcher wrapper
  become: true
  ansible.builtin.copy:
    dest: /usr/local/bin/start-hyprland-sddm
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -u

      LOG_FILE="/tmp/start-hyprland.log"
      {
        echo "===== start-hyprland-sddm $(date -Is) ====="
        echo "USER=${USER:-unknown}"
        echo "HOME=${HOME:-unknown}"
        echo "PATH=${PATH:-unknown}"
        echo "Hyprland binary: $(command -v Hyprland || echo missing)"
        echo "system start-hyprland binary: $(command -v start-hyprland || echo missing)"
        echo "uwsm binary: $(command -v uwsm || echo missing)"
        echo "dbus-run-session binary: $(command -v dbus-run-session || echo missing)"
      } >> "$LOG_FILE" 2>&1

      export XDG_SESSION_TYPE=wayland
      export XDG_CURRENT_DESKTOP=Hyprland
      export XDG_SESSION_DESKTOP=Hyprland
      export GDK_BACKEND=wayland,x11
      export QT_QPA_PLATFORM='wayland;xcb'
      export SDL_VIDEODRIVER=wayland
      export CLUTTER_BACKEND=wayland

      # Prefer the official/recommended start-hyprland helper when available.
      # Do NOT create /usr/local/bin/start-hyprland ourselves, because that shadows
      # the real helper and causes Hyprland's "launched without start-hyprland" warning.
      if command -v start-hyprland >/dev/null 2>&1; then
        echo "Launching with system start-hyprland" >> "$LOG_FILE"
        exec start-hyprland >> "$LOG_FILE" 2>&1
      fi

      # Modern Hyprland recommends UWSM-managed sessions when possible.
      if command -v uwsm >/dev/null 2>&1; then
        echo "Launching with uwsm start Hyprland" >> "$LOG_FILE"
        exec uwsm start Hyprland >> "$LOG_FILE" 2>&1
      fi

      # Last-resort fallback. This may show Hyprland's warning on newer versions,
      # but keeps the session usable on minimal installs.
      echo "Launching fallback dbus-run-session Hyprland" >> "$LOG_FILE"
      exec dbus-run-session Hyprland >> "$LOG_FILE" 2>&1
  when:
    - enable_login_manager | bool
    - login_manager == "sddm"

- name: Create Hyprland Wayland session file for SDDM
  become: true
  ansible.builtin.copy:
    dest: /usr/share/wayland-sessions/hyprland.desktop
    owner: root
    group: root
    mode: "0644"
    content: |
      [Desktop Entry]
      Name=Hyprland
      Comment=An intelligent dynamic tiling Wayland compositor
      Exec=/usr/local/bin/start-hyprland-sddm
      Type=Application
      DesktopNames=Hyprland
  when:
    - enable_login_manager | bool
    - login_manager == "sddm"

- name: Configure SDDM session behavior
  become: true
  ansible.builtin.copy:
    dest: /etc/sddm.conf.d/10-hyprland.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    content: |
      [Autologin]
      Session=hyprland.desktop

      [General]
      # Hyprland session file is managed at:
      # /usr/share/wayland-sessions/hyprland.desktop
      # SDDM should show Hyprland in the session selector.
      # The last selected session is remembered by SDDM.
  when:
    - enable_login_manager | bool
    - login_manager == "sddm"

- name: Disable greetd if it was previously enabled
  become: true
  ansible.builtin.systemd:
    name: greetd.service
    enabled: false
    state: stopped
  failed_when: false
  when:
    - enable_login_manager | bool
    - login_manager == "sddm"

- name: Enable SDDM service
  become: true
  ansible.builtin.systemd:
    name: sddm.service
    enabled: true
  when:
    - enable_login_manager | bool
    - login_manager == "sddm"

- name: Warn before rebooting into SDDM
  ansible.builtin.debug:
    msg: >-
      SDDM is installed and enabled. Reboot to use the graphical login screen.
      At the login screen, choose Hyprland from the session selector if it is not selected automatically.
      If Hyprland returns to SDDM, check /tmp/start-hyprland.log.
  when:
    - enable_login_manager | bool
    - login_manager == "sddm"
