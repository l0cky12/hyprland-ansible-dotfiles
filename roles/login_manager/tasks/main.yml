---
- name: Install greetd display manager
  become: true
  community.general.pacman:
    name: "{{ login_manager_packages }}"
    state: present
  when: enable_login_manager | bool

- name: Ensure greetd config directory exists
  become: true
  ansible.builtin.file:
    path: /etc/greetd
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: enable_login_manager | bool

- name: Configure greetd to launch tuigreet with Hyprland
  become: true
  ansible.builtin.copy:
    dest: /etc/greetd/config.toml
    owner: root
    group: root
    mode: "0644"
    backup: true
    content: |
      [terminal]
      vt = 1

      [default_session]
      command = "tuigreet --time --remember --remember-user-session --sessions /usr/share/wayland-sessions --cmd Hyprland"
      user = "greeter"
  when: enable_login_manager | bool

- name: Enable greetd service
  become: true
  ansible.builtin.systemd:
    name: greetd.service
    enabled: true
  when: enable_login_manager | bool

- name: Warn before starting greetd manually
  ansible.builtin.debug:
    msg: >-
      greetd is installed and enabled. Reboot to use the login manager.
      Do not start greetd over your current graphical session unless you are at a TTY.
  when: enable_login_manager | bool
