---
- name: Install SDDM login manager
  become: true
  community.general.pacman:
    name: "{{ login_manager_packages }}"
    state: present
  when:
    - enable_login_manager | bool
    - login_manager == "sddm"

- name: Ensure SDDM config directory exists
  become: true
  ansible.builtin.file:
    path: /etc/sddm.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - enable_login_manager | bool
    - login_manager == "sddm"

- name: Configure SDDM session behavior
  become: true
  ansible.builtin.copy:
    dest: /etc/sddm.conf.d/10-hyprland.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    content: |
      [General]
      # Hyprland installs /usr/share/wayland-sessions/hyprland.desktop.
      # SDDM will show Hyprland in the session selector.
      # The last selected session is remembered by SDDM.

      [Theme]
      Current=breeze
  when:
    - enable_login_manager | bool
    - login_manager == "sddm"

- name: Disable greetd if it was previously enabled
  become: true
  ansible.builtin.systemd:
    name: greetd.service
    enabled: false
    state: stopped
  failed_when: false
  when:
    - enable_login_manager | bool
    - login_manager == "sddm"

- name: Enable SDDM service
  become: true
  ansible.builtin.systemd:
    name: sddm.service
    enabled: true
  when:
    - enable_login_manager | bool
    - login_manager == "sddm"

- name: Warn before rebooting into SDDM
  ansible.builtin.debug:
    msg: >-
      SDDM is installed and enabled. Reboot to use the graphical login screen.
      At the login screen, choose Hyprland from the session selector if it is not selected automatically.
  when:
    - enable_login_manager | bool
    - login_manager == "sddm"
