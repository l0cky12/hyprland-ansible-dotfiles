---
- name: Verify system is Arch Linux
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Archlinux"
    fail_msg: "This playbook is intended for Arch Linux only."
    success_msg: "Arch Linux detected."

- name: Verify pacpkg.txt exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/{{ pacman_package_file }}"
  register: pacpkg_file

- name: Fail if pacpkg.txt is missing
  ansible.builtin.fail:
    msg: "Package list file not found: {{ playbook_dir }}/{{ pacman_package_file }}"
  when: not pacpkg_file.stat.exists

- name: Read pacpkg.txt
  ansible.builtin.slurp:
    src: "{{ playbook_dir }}/{{ pacman_package_file }}"
  register: pacpkg_raw

- name: Parse pacpkg.txt and ignore comments/blank lines
  ansible.builtin.set_fact:
    requested_packages: >-
      {{
        (pacpkg_raw.content | b64decode)
        | regex_replace('\r', '')
        | regex_findall('(?m)^\\s*([^#\\n][^#\\n]*?)\\s*(?:#.*)?$')
        | map('trim')
        | reject('equalto', '')
        | list
      }}

- name: Remove inline comment-only leftovers from parsed package list
  ansible.builtin.set_fact:
    requested_packages: "{{ requested_packages | reject('match', '^\\s*#') | list }}"
     

- name: Show parsed pacman package count
  ansible.builtin.debug:
    msg: "Found {{ requested_packages | length }} packages in {{ pacman_package_file }}."

- name: Check whether yay package list exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/{{ yay_package_file }}"
  register: yaypkg_file

- name: Read yay package list
  ansible.builtin.slurp:
    src: "{{ playbook_dir }}/{{ yay_package_file }}"
  register: yaypkg_raw
  when: yaypkg_file.stat.exists

- name: Parse yay package list and ignore comments/blank lines
  ansible.builtin.set_fact:
    yay_packages_from_file: >-
      {{
        (yaypkg_raw.content | b64decode)
        | regex_replace('\r', '')
        | regex_findall('(?m)^\\s*([^#\\n][^#\\n]*?)\\s*(?:#.*)?$')
        | map('trim')
        | reject('equalto', '')
        | reject('match', '^\\s*#')
        | list
      }}
  when: yaypkg_file.stat.exists

- name: Default yay package list to empty when file is missing
  ansible.builtin.set_fact:
    yay_packages_from_file: []
  when: not yaypkg_file.stat.exists

- name: Show parsed yay package count
  ansible.builtin.debug:
    msg: "Found {{ yay_packages_from_file | length }} packages in {{ yay_package_file }}."

- name: Update pacman database
  become: true
  community.general.pacman:
    update_cache: true

- name: Install required system packages
  become: true
  community.general.pacman:
    name: "{{ required_system_packages }}"
    state: present

- name: Install yay using helper script
  become: true
  ansible.builtin.script:
    cmd: "{{ playbook_dir }}/scripts/install-yay.sh {{ target_user }} {{ target_home }}"
  register: yay_install_result
  changed_when: "'yay is already installed' not in yay_install_result.stdout"
  when:
    - aur_helper == "yay"
    - install_aur_helper_if_missing | bool

- name: Show yay install script output
  ansible.builtin.debug:
    var: yay_install_result.stdout_lines
  when:
    - aur_helper == "yay"
    - install_aur_helper_if_missing | bool

- name: Verify yay is installed after helper script
  ansible.builtin.shell:
    cmd: "command -v yay"
  args:
    executable: /bin/bash
  register: yay_verify
  changed_when: false
  failed_when: yay_verify.rc != 0
  when:
    - aur_helper == "yay"
    - install_aur_helper_if_missing | bool

- name: Allow target user to run pacman without a sudo password for yay
  become: true
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/10-{{ target_user }}-pacman-nopasswd"
    owner: root
    group: root
    mode: "0440"
    content: |
      {{ target_user }} ALL=(root) NOPASSWD: /usr/bin/pacman

- name: Validate pacman sudoers rule
  become: true
  ansible.builtin.command:
    cmd: visudo -cf /etc/sudoers.d/10-{{ target_user }}-pacman-nopasswd
  changed_when: false

- name: Check whether jack2 is installed
  ansible.builtin.command:
    cmd: pacman -Qq jack2
  register: jack2_check
  changed_when: false
  failed_when: false

- name: Remove jack2 before installing pipewire-jack
  become: true
  ansible.builtin.command:
    cmd: pacman -Rns --noconfirm jack2
  when: jack2_check.rc == 0

- name: Install packages from pacpkg.txt with yay
  become: true
  become_user: "{{ target_user }}"
  ansible.builtin.shell:
    cmd: "{{ aur_helper }} -S --needed --noconfirm $(cat {{ playbook_dir }}/{{ pacman_package_file }})"
  args:
    executable: /bin/bash
  register: yay_pacpkg_install_result
  changed_when: "'there is nothing to do' not in ((yay_pacpkg_install_result.stdout | default('')) | lower)"

- name: Install packages from yaypkg.txt with yay
  become: true
  become_user: "{{ target_user }}"
  ansible.builtin.shell:
    cmd: "{{ aur_helper }} -S --needed --noconfirm $(cat {{ playbook_dir }}/{{ yay_package_file }})"
  args:
    executable: /bin/bash
  register: yay_yaypkg_install_result
  changed_when: "'there is nothing to do' not in ((yay_yaypkg_install_result.stdout | default('')) | lower)"
  when: yay_packages_from_file | length > 0
