---
# Target Linux user that owns the desktop session and dotfiles.
target_user: "liam"
target_home: "/home/{{ target_user }}"

# Existing Hyprland dotfiles repository.
dotfiles_repo: "https://github.com/fhlkfds/dotfiles.git"
dotfiles_dest: "{{ target_home }}/dotfiles"

# Package list files. These files live next to site.yml.
pacman_package_file: "pacpkg.txt"
yay_package_file: "yaypkg.txt"

# Preferred AUR helper.
aur_helper: "yay"
install_aur_helper_if_missing: true

# Packages required to build yay and AUR packages.
aur_build_dependencies:
  - base-devel
  - git
  - go

# Core packages required by this playbook.
required_system_packages:
  - git
  - stow
  - sudo

# Extra AUR packages to install with yay.
# Add AUR-only packages here.
extra_aur_packages: []
  # - visual-studio-code-bin
  # - google-chrome

# Stow package directories inside https://github.com/fhlkfds/dotfiles.
# Recommended: start with a smaller list first, then add more after verifying.
stow_packages:
  - fastfetch
  - hypr
  - hyprlock
  - noctalia
  - rofi
  - swaync
  - waybar
  - wofi
  - zsh

# Login manager for Hyprland.
# SDDM gives a normal graphical login screen and supports Wayland sessions.
enable_login_manager: true
login_manager: "sddm"
login_manager_packages:
  - sddm

# Packages required for SDDM to launch a real Hyprland session.
# These are duplicated here on purpose so the login manager role can guarantee
# Hyprland exists before creating/enabling the SDDM session.
hyprland_session_packages:
  - hyprland
  - xdg-desktop-portal-hyprland
  - xdg-desktop-portal
  - dbus
  - uwsm
  - qt5-wayland
  - qt6-wayland
